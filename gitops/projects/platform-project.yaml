apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-addons
  namespace: argocd
spec:
  description: Platform add-ons managed through GitOps
  sourceRepos:
  - '*'
  destinations:
  - namespace: external-secrets
    server: https://kubernetes.default.svc
  - namespace: reloader
    server: https://kubernetes.default.svc
  - namespace: argocd
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
