apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: svt-ingress
  namespace: svt
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
  - host: svt.app.company.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myapp
            port:
              number: 80
